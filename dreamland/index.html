<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Dreamland</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Pacifico&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--pink:#ff6b9d;--purple:#c084fc;--lavender:#dcc8ff;--gold:#ffd700;--sky:#7dd3fc;--mint:#6ee7b7;--deep:#0a0020;--card-bg:linear-gradient(160deg,#1c0b5e,#110338);--card-border:rgba(192,132,252,0.25)}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{font-family:'Fredoka',sans-serif;background:var(--deep);color:white;min-height:100vh;min-height:100dvh;overflow-x:hidden;position:relative;-webkit-font-smoothing:antialiased;padding-bottom:80px}
.starfield{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.star{position:absolute;width:2px;height:2px;background:white;border-radius:50%;animation:twinkle var(--dur) ease-in-out infinite alternate}
.star.big{width:4px;height:4px;box-shadow:0 0 6px 2px rgba(255,255,255,0.3)}
@keyframes twinkle{0%{opacity:0.15}100%{opacity:0.9}}
.app-wrapper{position:relative;z-index:10;max-width:480px;margin:0 auto;padding:20px 20px 30px;display:flex;flex-direction:column;align-items:center}
.title{font-family:'Pacifico',cursive;font-size:2.6rem;background:linear-gradient(135deg,var(--pink),var(--purple),var(--sky),var(--gold));background-size:300% 300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;color:transparent;animation:shimmer 4s ease-in-out infinite;margin-bottom:2px;line-height:1.2}
.greeting{font-size:0.95rem;color:var(--lavender);opacity:0.8;margin-bottom:6px;font-weight:400}
.subtitle{font-size:0.85rem;color:var(--lavender);opacity:0.5;margin-bottom:20px;font-weight:400}
@keyframes shimmer{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:linear-gradient(to top,#0a0020 60%,transparent);padding:8px 0 0}
.nav-inner{max-width:480px;margin:0 auto;display:flex;background:rgba(28,11,94,0.95);border:1.5px solid rgba(192,132,252,0.2);border-bottom:none;border-radius:20px 20px 0 0;padding:8px 4px 12px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 4px;border:none;background:none;color:rgba(255,255,255,0.35);font-family:'Fredoka',sans-serif;font-size:0.6rem;font-weight:500;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all 0.2s;letter-spacing:0.5px}
.nav-btn .nav-icon{font-size:22px;line-height:1;transition:transform 0.2s}
.nav-btn.active{color:var(--gold)}
.nav-btn.active .nav-icon{transform:scale(1.15)}
.section{display:none;width:100%}
.section.active{display:block;animation:fadeIn 0.3s ease-out}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.streak-bar{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:16px;padding:10px 16px;background:rgba(255,215,0,0.06);border:1.5px solid rgba(255,215,0,0.15);border-radius:16px;width:100%}
.streak-fire{font-size:20px}
.streak-count{font-size:1.1rem;font-weight:700;color:var(--gold)}
.streak-label{font-size:0.75rem;color:rgba(255,215,0,0.6);font-weight:500}
.streak-best{font-size:0.7rem;color:rgba(255,255,255,0.25);margin-left:auto}
.weekly-card{width:100%;padding:14px 18px;background:rgba(255,107,157,0.06);border:1.5px solid rgba(255,107,157,0.2);border-radius:16px;margin-bottom:16px}
.weekly-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.weekly-title{font-size:0.8rem;font-weight:600;color:var(--pink);text-transform:uppercase;letter-spacing:1px}
.weekly-desc{font-size:0.88rem;color:var(--lavender);margin-bottom:10px}
.weekly-bar-track{height:8px;background:rgba(0,0,0,0.3);border-radius:4px;overflow:hidden}
.weekly-bar-fill{height:100%;background:linear-gradient(90deg,var(--pink),var(--purple));border-radius:4px;transition:width 0.5s ease}
.weekly-progress{font-size:0.72rem;color:rgba(255,255,255,0.4);margin-top:6px;text-align:right}
.weekly-complete{color:var(--gold);font-weight:600}
.input-panel{background:var(--card-bg);border:2px solid var(--card-border);border-radius:28px;padding:28px 22px;box-shadow:0 12px 40px rgba(0,0,0,0.5);width:100%}
.input-label{font-size:1.1rem;color:var(--lavender);margin-bottom:20px;font-weight:500}
.time-input-row{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:24px}
.time-group{display:flex;flex-direction:column;align-items:center;gap:7px}
.time-group label{font-size:0.7rem;text-transform:uppercase;letter-spacing:2px;color:var(--purple);opacity:0.6;font-weight:600}
.time-stepper{display:flex;align-items:center;background:rgba(0,0,0,0.35);border:2px solid rgba(192,132,252,0.2);border-radius:18px;overflow:hidden}
.step-btn{width:48px;height:58px;border:none;background:transparent;color:var(--purple);font-size:1.6rem;font-family:'Fredoka',sans-serif;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none;transition:all 0.12s}
.step-btn:active{background:rgba(192,132,252,0.25);transform:scale(0.9)}
.time-display{width:54px;height:58px;display:flex;align-items:center;justify-content:center;font-size:1.9rem;font-weight:700;color:white;border-left:1px solid rgba(192,132,252,0.12);border-right:1px solid rgba(192,132,252,0.12)}
.time-separator{font-size:2rem;font-weight:700;color:var(--purple);opacity:0.4;padding-bottom:20px}
.magic-btn{border:none;padding:16px 36px;font-family:'Fredoka',sans-serif;font-size:1.15rem;font-weight:600;color:white;border-radius:60px;cursor:pointer;background:linear-gradient(135deg,var(--pink),#a855f7);box-shadow:0 4px 24px rgba(255,107,157,0.35);transition:all 0.3s;-webkit-tap-highlight-color:transparent;letter-spacing:0.3px;width:100%}
.magic-btn:active{transform:scale(0.97)}
.history-section{margin-top:20px}
.history-label{font-size:0.7rem;color:var(--purple);opacity:0.5;text-transform:uppercase;letter-spacing:2px;margin-bottom:8px}
.history-row{display:flex;gap:6px;justify-content:center;flex-wrap:wrap}
.history-dot{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;border:2px solid rgba(192,132,252,0.12);background:rgba(0,0,0,0.3)}
.history-dot.legendary{border-color:rgba(255,215,0,0.4);background:rgba(255,215,0,0.1);box-shadow:0 0 10px rgba(255,215,0,0.15)}
.history-dot.amazing{border-color:rgba(255,107,157,0.35);background:rgba(255,107,157,0.08)}
.history-dot.encourage{border-color:rgba(125,211,252,0.3);background:rgba(125,211,252,0.06)}
.journey-panel{background:var(--card-bg);border:2px solid var(--card-border);border-radius:28px;padding:26px 18px;box-shadow:0 12px 40px rgba(0,0,0,0.5);width:100%}
.journey-title{font-family:'Pacifico',cursive;font-size:1.4rem;color:var(--lavender);margin-bottom:4px}
.journey-subtitle{font-size:0.82rem;color:rgba(255,255,255,0.4);margin-bottom:20px}
.path-container{position:relative;width:100%;height:440px;margin-bottom:18px}
.path-track{position:absolute;left:50%;top:20px;bottom:20px;width:6px;transform:translateX(-50%);background:linear-gradient(to top,#2d1b69,#7c3aed 40%,#c084fc 70%,#ffd700);border-radius:3px;opacity:0.3}
.path-node{position:absolute;left:0;right:0;display:flex;align-items:center;justify-content:center;height:0}
.node-marker{position:absolute;left:50%;transform:translateX(-50%);width:16px;height:16px;border-radius:50%;border:3px solid rgba(192,132,252,0.25);background:rgba(12,0,40,0.9);z-index:2}
.node-marker.reached{border-color:var(--gold);background:rgba(255,215,0,0.15);box-shadow:0 0 10px rgba(255,215,0,0.25)}
.node-info{position:absolute;display:flex;align-items:center;gap:6px}
.node-info.left{right:calc(50% + 22px);flex-direction:row-reverse}
.node-info.right{left:calc(50% + 22px)}
.node-emoji-icon{font-size:1.1rem}
.node-name{font-size:0.72rem;color:rgba(255,255,255,0.3);white-space:nowrap}
.node-info.reached .node-name{color:rgba(255,255,255,0.75)}
.path-character{position:absolute;left:50%;transform:translateX(-50%);font-size:32px;z-index:10;transition:top 0.8s;animation:charBob 2s ease-in-out infinite}
@keyframes charBob{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-6px)}}
.destination-marker{position:absolute;top:0;left:50%;transform:translateX(-50%);font-size:36px;animation:destGlow 2s ease-in-out infinite alternate}
@keyframes destGlow{0%{filter:drop-shadow(0 0 12px rgba(255,215,0,0.25))}100%{filter:drop-shadow(0 0 28px rgba(255,215,0,0.55))}}
.start-icon{position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);font-size:22px}
.journey-stats{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.j-stat{background:rgba(0,0,0,0.3);border:1.5px solid rgba(192,132,252,0.15);border-radius:14px;padding:10px 14px;text-align:center;min-width:85px}
.j-stat-val{font-size:1.3rem;font-weight:700;line-height:1}
.j-stat-val.gold{color:var(--gold)}.j-stat-val.pink{color:var(--pink)}.j-stat-val.sky{color:var(--sky)}
.j-stat-label{font-size:0.6rem;text-transform:uppercase;letter-spacing:1.5px;color:rgba(255,255,255,0.4);margin-top:3px}
.journey-message{margin-top:16px;font-size:0.9rem;color:var(--lavender);opacity:0.7;line-height:1.5}
.reset-btn{margin-top:14px;border:1.5px solid rgba(255,255,255,0.1);background:transparent;color:rgba(255,255,255,0.3);padding:8px 18px;border-radius:30px;font-family:'Fredoka',sans-serif;font-size:0.75rem;cursor:pointer}
.collection-panel{background:var(--card-bg);border:2px solid var(--card-border);border-radius:28px;padding:24px 16px;width:100%}
.collection-header{text-align:center;margin-bottom:16px}
.collection-title{font-family:'Pacifico',cursive;font-size:1.4rem;color:var(--lavender)}
.collection-count{font-size:0.78rem;color:rgba(255,255,255,0.4);margin-top:2px}
.tier-filter{display:flex;gap:6px;margin-bottom:16px;justify-content:center}
.tier-btn{padding:7px 14px;border-radius:20px;border:1.5px solid rgba(192,132,252,0.15);background:rgba(0,0,0,0.2);font-family:'Fredoka',sans-serif;font-size:0.72rem;font-weight:600;color:rgba(255,255,255,0.4);cursor:pointer;-webkit-tap-highlight-color:transparent}
.tier-btn.active{border-color:var(--gold);color:var(--gold);background:rgba(255,215,0,0.08)}
.creature-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.creature-card{text-align:center;padding:14px 6px 10px;border-radius:18px;border:1.5px solid rgba(192,132,252,0.1);background:rgba(0,0,0,0.2);transition:all 0.2s}
.creature-card.discovered{border-color:rgba(192,132,252,0.25);background:rgba(192,132,252,0.05)}
.creature-card.discovered.legendary{border-color:rgba(255,215,0,0.3);background:rgba(255,215,0,0.05)}
.creature-emoji-card{font-size:36px;line-height:1;margin-bottom:4px;display:block}
.creature-card:not(.discovered) .creature-emoji-card{filter:brightness(0) saturate(0);opacity:0.15}
.creature-name-card{font-size:0.62rem;color:rgba(255,255,255,0.5);line-height:1.3;min-height:28px;display:flex;align-items:center;justify-content:center}
.creature-card:not(.discovered) .creature-name-card{color:rgba(255,255,255,0.2)}
.creature-met-count{font-size:0.58rem;color:rgba(255,215,0,0.5);margin-top:2px}
.badges-panel{background:var(--card-bg);border:2px solid var(--card-border);border-radius:28px;padding:24px 16px;width:100%}
.badges-title{font-family:'Pacifico',cursive;font-size:1.4rem;color:var(--lavender);text-align:center;margin-bottom:4px}
.badges-subtitle{font-size:0.78rem;color:rgba(255,255,255,0.35);text-align:center;margin-bottom:18px}
.badge-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.badge-item{text-align:center;padding:16px 8px 12px;border-radius:18px;border:1.5px solid rgba(192,132,252,0.08);background:rgba(0,0,0,0.2);transition:all 0.2s}
.badge-item.earned{border-color:rgba(255,215,0,0.3);background:rgba(255,215,0,0.05)}
.badge-icon{font-size:32px;line-height:1;margin-bottom:6px;display:block}
.badge-item:not(.earned) .badge-icon{filter:brightness(0.3) saturate(0);opacity:0.4}
.badge-name{font-size:0.65rem;color:rgba(255,255,255,0.5);line-height:1.3}
.badge-item:not(.earned) .badge-name{color:rgba(255,255,255,0.2)}
.badge-item.earned .badge-name{color:var(--lavender)}
.anticipation-overlay{position:fixed;inset:0;z-index:999;display:none;align-items:center;justify-content:center;flex-direction:column;background:radial-gradient(ellipse at 50% 40%,#1a0855,#0a0020 70%)}
.anticipation-overlay.show{display:flex}
.antic-label{font-size:1rem;color:var(--lavender);opacity:0.7;margin-bottom:16px;animation:fadeIn 0.3s}
.antic-meter{width:240px;height:16px;border-radius:8px;border:2px solid rgba(192,132,252,0.3);background:rgba(0,0,0,0.4);overflow:hidden;margin-bottom:12px}
.antic-fill{height:100%;border-radius:6px;width:0;transition:width 0.6s ease}
.antic-fill.legendary{background:linear-gradient(90deg,var(--purple),var(--gold))}
.antic-fill.amazing{background:linear-gradient(90deg,var(--purple),var(--pink))}
.antic-fill.encourage{background:linear-gradient(90deg,#334,var(--sky))}
.antic-stars{font-size:28px;margin-bottom:10px;min-height:36px}
.antic-msg{font-size:0.85rem;color:var(--lavender);opacity:0}
.overlay{position:fixed;inset:0;z-index:1000;display:none;align-items:center;justify-content:center;padding:20px}
.overlay.show{display:flex}
.overlay-bg{position:absolute;inset:0}
.tier-legendary .overlay-bg{background:radial-gradient(ellipse at 50% 30%,#2a1060,#0a0020 65%)}
.tier-amazing .overlay-bg{background:radial-gradient(ellipse at 50% 30%,#1f0850,#0a0020 65%)}
.tier-encourage .overlay-bg{background:radial-gradient(ellipse at 50% 30%,#0d1040,#0a0020 65%)}
.result-card{position:relative;z-index:2;background:linear-gradient(160deg,#1e0d62,#130440);border-radius:32px;padding:30px 22px 24px;max-width:400px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.6);overflow-y:auto;max-height:90vh;-webkit-overflow-scrolling:touch;animation:cardBounce 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.15s both}
.tier-legendary .result-card{border:2px solid rgba(255,215,0,0.35);box-shadow:0 20px 60px rgba(0,0,0,0.6),0 0 40px rgba(255,215,0,0.1)}
.tier-amazing .result-card{border:2px solid rgba(255,107,157,0.3)}
.tier-encourage .result-card{border:2px solid rgba(125,211,252,0.25)}
@keyframes cardBounce{from{opacity:0;transform:scale(0.6) translateY(30px)}to{opacity:1;transform:scale(1) translateY(0)}}
.creature-emoji-big{font-size:88px;line-height:1;display:block;margin-bottom:6px;animation:creatureAppear 0.7s cubic-bezier(0.34,1.56,0.64,1) 0.3s both}
.tier-legendary .creature-emoji-big{animation:creatureAppear 0.7s cubic-bezier(0.34,1.56,0.64,1) 0.3s both,legendaryFloat 3s ease-in-out 1s infinite}
@keyframes creatureAppear{0%{opacity:0;transform:scale(0) rotate(-15deg)}60%{transform:scale(1.12) rotate(4deg)}100%{opacity:1;transform:scale(1) rotate(0)}}
@keyframes legendaryFloat{0%,100%{transform:translateY(0) rotate(-1deg)}50%{transform:translateY(-10px) rotate(1deg)}}
.creature-name-big{font-family:'Pacifico',cursive;font-size:1.5rem;margin-bottom:2px;line-height:1.3;animation:fadeUp 0.4s ease-out 0.55s both}
.tier-legendary .creature-name-big{background:linear-gradient(135deg,var(--gold),#fff5c0,var(--gold));background-size:200% 200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;color:transparent}
.tier-amazing .creature-name-big{color:var(--pink)}
.tier-encourage .creature-name-big{color:var(--sky)}
.creature-rarity{font-size:0.65rem;text-transform:uppercase;letter-spacing:3px;margin-bottom:10px;font-weight:600;animation:fadeUp 0.4s ease-out 0.65s both}
.tier-legendary .creature-rarity{color:var(--gold)}
.tier-amazing .creature-rarity{color:var(--pink)}
.tier-encourage .creature-rarity{color:var(--mint)}
.sleep-badge{display:inline-flex;align-items:center;gap:8px;padding:7px 16px;border-radius:50px;font-size:0.85rem;font-weight:600;margin-bottom:10px;animation:fadeUp 0.4s ease-out 0.7s both}
.tier-legendary .sleep-badge{background:rgba(255,215,0,0.12);border:1.5px solid rgba(255,215,0,0.25);color:var(--gold)}
.tier-amazing .sleep-badge{background:rgba(255,107,157,0.12);border:1.5px solid rgba(255,107,157,0.25);color:var(--pink)}
.tier-encourage .sleep-badge{background:rgba(125,211,252,0.08);border:1.5px solid rgba(125,211,252,0.2);color:var(--sky)}
.creature-message{font-size:0.92rem;line-height:1.5;color:rgba(255,255,255,0.8);max-width:320px;margin:0 auto 8px;animation:fadeUp 0.4s ease-out 0.8s both}
.rarity-count{font-size:0.75rem;color:rgba(255,255,255,0.35);margin-bottom:8px;animation:fadeUp 0.3s ease-out 0.85s both}
.new-badge-alert{padding:8px 14px;border-radius:12px;background:rgba(255,215,0,0.1);border:1px solid rgba(255,215,0,0.2);font-size:0.82rem;color:var(--gold);margin-bottom:8px;animation:fadeUp 0.4s ease-out 0.88s both}
.journey-update{font-size:0.8rem;padding:9px 14px;border-radius:12px;margin-bottom:14px;animation:fadeUp 0.4s ease-out 0.9s both}
.tier-legendary .journey-update{background:rgba(255,215,0,0.08);border:1px solid rgba(255,215,0,0.15);color:var(--gold)}
.tier-amazing .journey-update{background:rgba(255,107,157,0.06);border:1px solid rgba(255,107,157,0.12);color:var(--pink)}
.tier-encourage .journey-update{background:rgba(125,211,252,0.06);border:1px solid rgba(125,211,252,0.12);color:var(--sky)}
.close-btn{border:2px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.05);color:white;padding:12px 30px;border-radius:50px;font-family:'Fredoka',sans-serif;font-size:0.95rem;font-weight:500;cursor:pointer;animation:fadeUp 0.4s ease-out 0.95s both;-webkit-tap-highlight-color:transparent}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.sparkle-container{position:fixed;inset:0;pointer-events:none;z-index:1001;overflow:hidden}
.sparkle{position:absolute;border-radius:50%;pointer-events:none}
.sparkle-star{position:absolute;pointer-events:none;animation:sparkleFloat 1.4s ease-out forwards}
@keyframes sparkleFloat{0%{opacity:1;transform:translate(0,0) scale(1) rotate(0deg)}100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(0) rotate(360deg)}}
@media(max-width:400px){.time-display{width:44px;font-size:1.6rem}.step-btn{width:40px;height:50px;font-size:1.4rem}.app-wrapper{padding:16px 14px 26px}.title{font-size:2.1rem}}
</style>
</head>
<body>
<div class="starfield" id="starfield"></div>
<div class="app-wrapper">
<div class="title">Dreamland</div>
<div class="greeting" id="greeting"></div>
<div class="subtitle" id="subtitleText">🌙 Your magical sleep adventure 🌙</div>
<div class="section active" id="sectionSleep">
<div class="streak-bar" id="streakBar"><span class="streak-fire">🔥</span><span class="streak-count" id="streakCount">0</span><span class="streak-label">day streak</span><span class="streak-best" id="streakBest"></span></div>
<div class="weekly-card" id="weeklyCard"><div class="weekly-header"><span>🎯</span><span class="weekly-title">Weekly Challenge</span></div><div class="weekly-desc" id="weeklyDesc"></div><div class="weekly-bar-track"><div class="weekly-bar-fill" id="weeklyFill"></div></div><div class="weekly-progress" id="weeklyProgress"></div></div>
<div class="input-panel">
<div class="input-label">⭐ How long did you sleep? ⭐</div>

function renderStreak(){var data=getData();document.getElementById('streakCount').textContent=data.streak.current||0;var b=data.streak.best||0;document.getElementById('streakBest').textContent=b>0?'Best: '+b:''}
function renderWeekly(){var data=getData(),wk=getWeekly(data);document.getElementById('weeklyDesc').textContent='Get '+wk.target+' Legendary sleeps this week!';document.getElementById('weeklyFill').style.width=Math.min(100,wk.count/wk.target*100)+'%';if(wk.done)document.getElementById('weeklyProgress').innerHTML='<span class="weekly-complete">✅ CHALLENGE COMPLETE!</span>';else document.getElementById('weeklyProgress').textContent=wk.count+' / '+wk.target}
function renderJourney(){var data=getData(),ti=data.journeyTheme||0,theme=THEMES[ti];document.getElementById('journeyTitle').textContent=theme.name;document.getElementById('journeySub').textContent=theme.sub;document.getElementById('destMarker').textContent=theme.dest;var con=document.getElementById('pathContainer'),old=con.querySelectorAll('.path-node,.path-character');for(var i=0;i<old.length;i++)old[i].parentNode.removeChild(old[i]);var pad=30,totalH=420,nodes=theme.nodes;for(var i=0;i<nodes.length;i++){var nd=nodes[i],pct=1-(i/TOTAL_STEPS),top=pad+pct*(totalH-pad*2),wrap=document.createElement('div');wrap.className='path-node';wrap.style.top=top+'px';var mk=document.createElement('div');mk.className='node-marker'+(i<=data.position?' reached':'');wrap.appendChild(mk);var info=document.createElement('div');info.className='node-info '+nd.s+(i<=data.position?' reached':'');var em=document.createElement('span');em.className='node-emoji-icon';em.textContent=nd.e;info.appendChild(em);var nm=document.createElement('span');nm.className='node-name';nm.textContent=nd.n;info.appendChild(nm);wrap.appendChild(info);con.appendChild(wrap)}var cp=1-(data.position/TOTAL_STEPS),ct=pad+cp*(totalH-pad*2)-16,ce=document.createElement('div');ce.className='path-character';ce.style.top=ct+'px';ce.textContent='👧';con.appendChild(ce);var lc=data.history.filter(function(h){return h.tier==='legendary'}).length;document.getElementById('journeyStats').innerHTML='<div class="j-stat"><div class="j-stat-val gold">'+data.position+'/'+TOTAL_STEPS+'</div><div class="j-stat-label">Progress</div></div><div class="j-stat"><div class="j-stat-val pink">'+lc+'</div><div class="j-stat-label">Legendary</div></div><div class="j-stat"><div class="j-stat-val sky">'+(data.journeysCompleted||0)+'</div><div class="j-stat-label">Complete</div></div>';var msg=document.getElementById('journeyMessage');if(data.history.length===0)msg.textContent="Start your adventure! Log your sleep! 🌈";else if(data.position>=8)msg.textContent="SO CLOSE! Keep up those amazing sleeps! ✨";else if(data.position>=5)msg.textContent="Past halfway! The end is getting closer! 💫";else if(data.position>=2)msg.textContent="Great progress! Keep sleeping well! 🌟";else msg.textContent="Every journey starts with a good night's sleep! 💪"}
var colFilter='all';
function renderCollection(f){if(f)colFilter=f;var data=getData(),grid=document.getElementById('creatureGrid');grid.innerHTML='';var list=colFilter==='all'?ALL_CREATURES:CREATURES[colFilter]||ALL_CREATURES;var disc=Object.keys(data.collection).length;document.getElementById('collectionCount').textContent=disc+' / '+ALL_CREATURES.length+' discovered';for(var i=0;i<list.length;i++){var c=list[i],found=!!data.collection[c.id],card=document.createElement('div');card.className='creature-card'+(found?' discovered':'')+(found&&c.tier==='legendary'?' legendary':'');var em=document.createElement('span');em.className='creature-emoji-card';em.textContent=c.emoji;card.appendChild(em);var nm=document.createElement('div');nm.className='creature-name-card';nm.textContent=found?c.name:'???';card.appendChild(nm);if(found){var ct=document.createElement('div');ct.className='creature-met-count';ct.textContent='Met '+data.collection[c.id].count+'x';card.appendChild(ct)}grid.appendChild(card)}document.querySelectorAll('.tier-btn').forEach(function(b){b.className=b.getAttribute('data-tier')===colFilter?'tier-btn active':'tier-btn'})}
function renderBadges(){var data=getData(),grid=document.getElementById('badgeGrid');grid.innerHTML='';document.getElementById('badgeCount').textContent=data.badges.length+' / '+BADGE_DEFS.length+' earned';for(var i=0;i<BADGE_DEFS.length;i++){var b=BADGE_DEFS[i],earned=data.badges.indexOf(b.id)!==-1,item=document.createElement('div');item.className='badge-item'+(earned?' earned':'');var ic=document.createElement('span');ic.className='badge-icon';ic.textContent=b.icon;item.appendChild(ic);var nm=document.createElement('div');nm.className='badge-name';nm.textContent=earned?b.name:b.desc;item.appendChild(nm);grid.appendChild(item)}}
function createStarfield(){var sf=document.getElementById('starfield');for(var i=0;i<65;i++){var s=document.createElement('div');s.className='star'+(Math.random()>0.88?' big':'');s.style.left=(Math.random()*100)+'%';s.style.top=(Math.random()*100)+'%';s.style.setProperty('--dur',(1.5+Math.random()*3)+'s');s.style.animationDelay=(Math.random()*3)+'s';sf.appendChild(s)}}
document.getElementById('hDec').addEventListener('click',function(){adjustTime('hours',-1)});
document.getElementById('hInc').addEventListener('click',function(){adjustTime('hours',1)});
document.getElementById('mDec').addEventListener('click',function(){adjustTime('mins',-5)});
document.getElementById('mInc').addEventListener('click',function(){adjustTime('mins',5)});
document.getElementById('revealBtn').addEventListener('click',revealCreature);
document.getElementById('closeBtn').addEventListener('click',closeOverlay);
document.getElementById('resetBtn').addEventListener('click',function(){if(confirm("Start a brand new journey?")){var d=getData();d.position=0;save(d);renderJourney()}});
document.querySelectorAll('.nav-btn').forEach(function(b){b.addEventListener('click',function(){switchTab(b.getAttribute('data-tab'))})});
document.querySelectorAll('.tier-btn').forEach(function(b){b.addEventListener('click',function(){renderCollection(b.getAttribute('data-tier'))})});
createStarfield();document.getElementById('greeting').textContent=getGreeting();renderHistory();renderStreak();renderWeekly();updateDisplay();
})();
</script>
</body>
</html>
