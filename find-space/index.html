<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0f1923;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#e8e8e8;user-select:none;-webkit-user-select:none;touch-action:none}
#app{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center}
.screen{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center;position:absolute;top:0;left:0;transition:opacity 0.3s}
.screen.hidden{opacity:0;pointer-events:none}
.title{font-size:36px;font-weight:800;letter-spacing:-1px;margin-bottom:4px}
.title .accent{color:#f59e0b}
.subtitle{font-size:15px;color:#94a3b8;margin-bottom:30px;max-width:300px;line-height:1.5}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:16px 40px;border-radius:14px;font-size:18px;font-weight:700;border:none;cursor:pointer;transition:transform 0.15s,background 0.2s;-webkit-tap-highlight-color:transparent}
.btn:active{transform:scale(0.95)}
.btn-primary{background:#f59e0b;color:#1a1a2e}
.btn-secondary{background:rgba(255,255,255,0.1);color:#e8e8e8;margin-top:10px;font-size:14px;padding:12px 30px}
.position-badge{display:inline-block;padding:6px 18px;border-radius:20px;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
.position-badge.forward{background:rgba(245,158,11,0.2);color:#f59e0b}
.position-badge.midfielder{background:rgba(59,130,246,0.2);color:#60a5fa}
.position-badge.defender{background:rgba(34,197,94,0.2);color:#4ade80}
.phase-badge{display:inline-block;padding:4px 14px;border-radius:12px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px}
.phase-badge.attacking{background:rgba(251,191,36,0.15);color:#fbbf24;border:1px solid rgba(251,191,36,0.3)}
.phase-badge.defending{background:rgba(239,68,68,0.15);color:#f87171;border:1px solid rgba(239,68,68,0.3)}
.briefing-title{font-size:22px;font-weight:700;margin-bottom:10px}
.briefing-text{font-size:15px;color:#94a3b8;line-height:1.6;max-width:320px;margin-bottom:24px}
.game-container{width:100%;height:100%;display:flex;flex-direction:column;position:relative}
.hud{display:flex;justify-content:space-between;align-items:center;padding:8px 16px;height:50px;flex-shrink:0}
.hud-score{font-size:20px;font-weight:800;color:#f59e0b}
.hud-scenario{font-size:12px;color:#64748b;font-weight:600;text-transform:uppercase;letter-spacing:1px}
.hud-position{font-size:13px;font-weight:600;color:#94a3b8}
.timer-bar{height:4px;background:rgba(255,255,255,0.1);flex-shrink:0}
.timer-fill{height:100%;background:#f59e0b;transition:width 0.1s linear;border-radius:0 2px 2px 0}
.pitch-wrapper{flex:1;display:flex;align-items:center;justify-content:center;padding:8px}
.pitch{position:relative;background:#1e6b3a;border-radius:8px;overflow:hidden;border:2px solid rgba(255,255,255,0.25);touch-action:none;max-width:400px}
.pitch-lines{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
.pitch-lines svg{width:100%;height:100%}
.hint-bar{height:40px;display:flex;align-items:center;justify-content:center;padding:0 16px;flex-shrink:0}
.hint-text{font-size:13px;color:#94a3b8;text-align:center;animation:fadeIn 0.5s}
.dot{position:absolute;border-radius:50%;transform:translate(-50%,-50%);display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:rgba(255,255,255,0.9);pointer-events:none;transition:left 0.8s ease,top 0.8s ease}
.dot.user-player{width:38px;height:38px;background:#3b82f6;border:3px solid #93c5fd;box-shadow:0 0 16px rgba(59,130,246,0.5);z-index:20;pointer-events:auto;cursor:grab;transition:none;font-size:9px}
.dot.team{width:24px;height:24px;background:#3b82f6;border:2px solid #93c5fd;z-index:10}
.dot.opponent{width:24px;height:24px;background:#ef4444;border:2px solid #fca5a5;z-index:10}
.dot.ball{width:14px;height:14px;background:#fff;border:2px solid #d1d5db;z-index:15;transition:left 1s ease,top 1s ease}
.dot.ghost{width:36px;height:36px;background:rgba(245,158,11,0.2);border:2px dashed rgba(245,158,11,0.5);z-index:5;transition:left 0.4s ease,top 0.4s ease;animation:ghostPulse 1.5s ease-in-out infinite}
.dot-label{position:absolute;bottom:-14px;font-size:8px;color:rgba(255,255,255,0.6);font-weight:600;white-space:nowrap;pointer-events:none}
.proximity-ring{position:absolute;border-radius:50%;border:2px solid rgba(74,222,128,0.4);background:rgba(74,222,128,0.08);transform:translate(-50%,-50%);z-index:4;pointer-events:none;transition:width 0.3s,height 0.3s,opacity 0.3s}
.point-popup{position:absolute;font-weight:800;font-size:16px;color:#4ade80;z-index:30;pointer-events:none;animation:floatUp 0.8s ease forwards}
.freeze-overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(15,25,35,0.6);z-index:25;display:flex;align-items:center;justify-content:center;animation:fadeIn 0.3s}
.freeze-prompt{position:absolute;top:8px;left:0;right:0;text-align:center;font-size:16px;font-weight:700;color:#fff;z-index:30;text-shadow:0 2px 8px rgba(0,0,0,0.5)}
.freeze-option{position:absolute;transform:translate(-50%,-50%);z-index:30;cursor:pointer;-webkit-tap-highlight-color:transparent;pointer-events:auto;display:flex;flex-direction:column;align-items:center;gap:4px}
.freeze-circle{width:56px;height:56px;border-radius:50%;border:3px solid rgba(255,255,255,0.7);background:rgba(255,255,255,0.15);transition:all 0.3s}
.freeze-label{font-size:11px;font-weight:700;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,0.8);white-space:nowrap;background:rgba(0,0,0,0.5);padding:2px 8px;border-radius:8px}
.freeze-circle.correct{border-color:#4ade80;background:rgba(74,222,128,0.4)}
.freeze-circle.wrong{border-color:#ef4444;background:rgba(239,68,68,0.3)}
.feedback-card{position:absolute;bottom:50px;left:12px;right:12px;background:rgba(15,25,35,0.95);border-radius:14px;padding:20px 22px;z-index:35;animation:slideUp 0.3s ease;border:1px solid rgba(255,255,255,0.1)}
.feedback-card.correct{border-color:rgba(74,222,128,0.3)}
.feedback-card.wrong{border-color:rgba(239,68,68,0.3)}
.feedback-icon{font-size:28px;margin-bottom:6px}
.feedback-msg{font-size:18px;line-height:1.6;color:#cbd5e1}
.results-score{font-size:48px;font-weight:800;color:#f59e0b;margin:10px 0}
.stars{display:flex;gap:8px;justify-content:center;margin:16px 0}
.star{width:40px;height:40px;transition:transform 0.3s}
.star svg{width:100%;height:100%}
.star.earned svg{fill:#f59e0b}
.star.empty svg{fill:#334155}
.results-breakdown{text-align:left;width:100%;max-width:300px;margin:16px auto}
.breakdown-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.06);font-size:14px}
.breakdown-label{color:#94a3b8}
.breakdown-val{font-weight:700;color:#e8e8e8}
@keyframes ghostPulse{0%,100%{opacity:0.6;transform:translate(-50%,-50%) scale(1)}50%{opacity:1;transform:translate(-50%,-50%) scale(1.1)}}
@keyframes floatUp{0%{transform:translateY(0);opacity:1}100%{transform:translateY(-30px);opacity:0}}
@keyframes fadeIn{0%{opacity:0}100%{opacity:1}}
@keyframes slideUp{0%{transform:translateY(20px);opacity:0}100%{transform:translateY(0);opacity:1}}
@keyframes bounceIn{0%{transform:scale(0)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
</style>
<div id="app"></div>
<script>
const SCENARIOS=[
{id:1,position:'Forward',posClass:'forward',phase:'attacking',title:'Come short',

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}

function lerp(a,b,t){return a+(b-a)*Math.min(1,Math.max(0,t))}

function interpPath(path,time){
for(let i=path.length-1;i>=0;i--){
if(time>=path[i].t){
if(i===path.length-1)return{x:path[i].x,y:path[i].y};
const n=path[i+1];const pct=(time-path[i].t)/(n.t-path[i].t);
return{x:lerp(path[i].x,n.x,pct),y:lerp(path[i].y,n.y,pct)}}
}return{x:path[0].x,y:path[0].y}}

function dist(a,b){return Math.sqrt((a.x-b.x)**2+(a.y-b.y)**2)}

function makeDot(cls,label){
const d=document.createElement('div');
d.className='dot '+cls;
if(label){const l=document.createElement('div');l.className='dot-label';l.textContent=label;d.appendChild(l)}

function sizePitch(){
const pitch=document.getElementById('pitch');
if(!pitch)return;
const wrapper=pitch.parentElement;
const ww=wrapper.clientWidth-16;
const wh=wrapper.clientHeight-16;
const aspect=2/3;
let pw=ww;let ph=pw/aspect;
if(ph>wh){ph=wh;pw=ph*aspect}
pitch.style.width=pw+'px';pitch.style.height=ph+'px'}

function posY(y){return(y/100)*100+'%'}
function posX(x){return x+'%'}

function positionAll(){
const s=state.scenario;
const pitch=document.getElementById('pitch');
if(!pitch)return;

const player=document.getElementById('user-player');
if(player){player.style.left=posX(state.playerPos.x);player.style.top=posY(state.playerPos.y)}

const ghost=document.getElementById('ghost');
if(ghost){
const gp=interpPath(s.ghostPath,state.elapsedTime);
ghost.style.left=posX(gp.x);ghost.style.top=posY(gp.y)}

const ball=document.getElementById('ball');
if(ball){
const bp=interpPath(s.ballPath,state.elapsedTime);
ball.style.left=posX(bp.x);ball.style.top=posY(bp.y)}

const teamDots=pitch.querySelectorAll('.dot.team');
s.team.forEach((p,i)=>{if(teamDots[i]){teamDots[i].style.left=posX(p.x);teamDots[i].style.top=posY(p.y)}});

const oppDots=pitch.querySelectorAll('.dot.opponent');
s.opponents.forEach((p,i)=>{if(oppDots[i]){oppDots[i].style.left=posX(p.x);oppDots[i].style.top=posY(p.y)}})}

function setupTouch(){
const pitch=document.getElementById('pitch');
const player=document.getElementById('user-player');
if(!pitch||!player)return;

let dragOffset={x:0,y:0};

function startDrag(cx,cy){
if(state.screen!=='playing')return;
const pr=pitch.getBoundingClientRect();
const plr=player.getBoundingClientRect();
const pcx=plr.left+plr.width/2;
const pcy=plr.top+plr.height/2;
dragOffset.x=cx-pcx;
dragOffset.y=cy-pcy;
state.isDragging=true}

function moveDrag(cx,cy){
if(!state.isDragging||state.screen!=='playing')return;
const pr=pitch.getBoundingClientRect();
const rx=cx-dragOffset.x-pr.left;
const ry=cy-dragOffset.y-pr.top;
const px=Math.max(2,Math.min(98,(rx/pr.width)*100));
const py=Math.max(2,Math.min(98,(ry/pr.height)*100));
state.playerPos.x=px;state.playerPos.y=py;
player.style.left=posX(px);player.style.top=posY(py)}

function endDrag(){state.isDragging=false}

player.addEventListener('touchstart',(e)=>{e.preventDefault();const t=e.touches[0];startDrag(t.clientX,t.clientY)},{passive:false});
document.addEventListener('touchmove',(e)=>{if(state.isDragging){e.preventDefault();const t=e.touches[0];moveDrag(t.clientX,t.clientY)}},{passive:false});
document.addEventListener('touchend',endDrag);

player.addEventListener('mousedown',(e)=>{e.preventDefault();startDrag(e.clientX,e.clientY)});
document.addEventListener('mousemove',(e)=>{moveDrag(e.clientX,e.clientY)});
document.addEventListener('mouseup',endDrag);

pitch.addEventListener('touchstart',(e)=>{
if(state.screen==='playing'&&!state.isDragging){
e.preventDefault();
const t=e.touches[0];
const pr=pitch.getBoundingClientRect();
const px=(t.clientX-pr.left)/pr.width*100;
const py=(t.clientY-pr.top)/pr.height*100;
const d=dist(state.playerPos,{x:px,y:py});
if(d<20){dragOffset.x=0;dragOffset.y=0;state.isDragging=true;moveDrag(t.clientX,t.clientY)}}},{passive:false})}

function startRound(){
const attacking=shuffle(SCENARIOS.filter(s=>(s.phase||'attacking')==='attacking'));
const defending=shuffle(SCENARIOS.filter(s=>s.phase==='defending'));
const atkPick=attacking.slice(0,3);
const defPick=defending.slice(0,2);
const picked=shuffle([...atkPick,...defPick]);
state.round=picked;state.scenarioIndex=0;state.roundScore=0;state.scenarioScores=[];
state.scenario=picked[0];state.screen='briefing';
render()}

function beginScenario(){
const s=state.scenario;
state.playerPos={...s.playerStart};
state.elapsedTime=0;state.score=0;state.freezeAnswered=false;state.freezeCorrect=false;
state.screen='playing';
render();

startTime=performance.now();
gameTimer=requestAnimationFrame(gameTick);
scoreTimer=setInterval(doScore,200)}

function gameTick(ts){
if(state.screen!=='playing'){return}
state.elapsedTime=ts-startTime;

const ghost=document.getElementById('ghost');
if(ghost){const gp=interpPath(state.scenario.ghostPath,state.elapsedTime);ghost.style.left=posX(gp.x);ghost.style.top=posY(gp.y)}

const ball=document.getElementById('ball');
if(ball){const bp=interpPath(state.scenario.ballPath,state.elapsedTime);ball.style.left=posX(bp.x);ball.style.top=posY(bp.y)}

const tf=document.getElementById('timer-fill');
if(tf){tf.style.width=(state.elapsedTime/state.scenario.freezeAt*100)+'%'}

if(state.elapsedTime>=state.scenario.freezeAt){
triggerFreeze();return}

gameTimer=requestAnimationFrame(gameTick)}

function doScore(){
if(state.screen!=='playing')return;
const gp=interpPath(state.scenario.ghostPath,state.elapsedTime);
const d=dist(state.playerPos,gp);
let pts=0;
if(d<5)pts=3;
else if(d<10)pts=2;
else if(d<15)pts=1;
if(pts>0){
state.score+=pts;state.roundScore+=pts;
const sd=document.getElementById('score-display');
if(sd)sd.textContent=Math.round(state.roundScore);
if(Math.random()<0.3)showPopup(pts)}

const player=document.getElementById('user-player');
if(player){
if(d<10)player.style.boxShadow='0 0 20px rgba(74,222,128,0.6)';
else if(d<18)player.style.boxShadow='0 0 16px rgba(59,130,246,0.5)';
else player.style.boxShadow='0 0 12px rgba(239,68,68,0.4)'}

const hint=document.getElementById('hint-bar');
if(hint){
if(d<8)hint.innerHTML='<span class="hint-text" style="color:#4ade80">Great position!</span>';
else if(d<18)hint.innerHTML='<span class="hint-text" style="color:#f59e0b">Getting closer...</span>';
else hint.innerHTML='<span class="hint-text">Follow the ghost!</span>'}}

function showPopup(pts){
const pop=document.getElementById('pop-layer');
if(!pop)return;
const el=document.createElement('div');
el.className='point-popup';
el.style.left=state.playerPos.x+'%';
el.style.top=posY(state.playerPos.y);
el.textContent='+'+pts;
el.id='pop-'+(popupId++);
pop.appendChild(el);
setTimeout(()=>el.remove(),900)}

function triggerFreeze(){
clearInterval(scoreTimer);
state.screen='freeze';
const tf=document.getElementById('timer-fill');
if(tf)tf.style.width='100%';

const ghost=document.getElementById('ghost');
if(ghost)ghost.style.display='none';

const hint=document.getElementById('hint-bar');
if(hint)hint.innerHTML='<span class="hint-text" style="color:#60a5fa">Tap where you should be!</span>';

const pitch=document.getElementById('pitch');
renderFreezeOverlay(pitch)}

circle.id='fo-circle-'+i;
const label=document.createElement('div');
label.className='freeze-label';
label.textContent=opt.label;
fo.appendChild(circle);fo.appendChild(label);
fo.addEventListener('click',()=>handleFreezeChoice(i));
fo.addEventListener('touchend',(e)=>{e.preventDefault();e.stopPropagation();handleFreezeChoice(i)});
overlay.appendChild(fo)});
pitch.appendChild(overlay)}

function handleFreezeChoice(idx){
if(state.freezeAnswered)return;
state.freezeAnswered=true;
const s=state.scenario;
const chosen=s.freezeOptions[idx];
state.freezeCorrect=chosen.correct;

if(chosen.correct){state.score+=50;state.roundScore+=50}

s.freezeOptions.forEach((opt,i)=>{
const c=document.getElementById('fo-circle-'+i);
if(c){c.classList.add(opt.correct?'correct':'wrong');
if(!opt.correct)c.style.opacity='0.4'}});

const sd=document.getElementById('score-display');
if(sd)sd.textContent=Math.round(state.roundScore);

const pitch=document.getElementById('pitch');
const fb=document.createElement('div');
fb.className='feedback-card '+(state.freezeCorrect?'correct':'wrong');
fb.innerHTML=`<div style="font-size:20px;margin-bottom:6px">${state.freezeCorrect?'✅':'❌'}</div>
<div class="feedback-msg">${state.freezeCorrect?s.correctMsg:s.wrongMsg}</div>
<div style="margin-top:12px;font-size:16px;color:#e2e8f0;line-height:1.6;background:rgba(255,255,255,0.06);padding:10px 14px;border-radius:8px;border-left:3px solid #fbbf24">💡 ${s.tip}</div>
<div style="margin-top:14px;text-align:center"><button id="next-btn" style="background:#f59e0b;color:#1a1a2e;border:none;padding:12px 32px;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent">Got it →</button></div>`;
pitch.appendChild(fb);

state.scenarioScores.push({scenario:s,score:state.score,correct:state.freezeCorrect});

document.getElementById('next-btn').addEventListener('click',()=>{nextScenario()});
document.getElementById('next-btn').addEventListener('touchend',(e)=>{e.preventDefault();nextScenario()})}

function nextScenario(){
state.scenarioIndex++;
if(state.scenarioIndex>=state.round.length){showResults();return}
state.scenario=state.round[state.scenarioIndex];
state.screen='briefing';
render()}

function showResults(){
state.screen='results';
const stars=state.roundScore>=400?3:state.roundScore>=220?2:state.roundScore>=80?1:0;
const correctCount=state.scenarioScores.filter(s=>s.correct).length;
const attackScenarios=state.scenarioScores.filter(s=>(s.scenario.phase||'attacking')==='attacking');
const defendScenarios=state.scenarioScores.filter(s=>s.scenario.phase==='defending');
const attackCorrect=attackScenarios.filter(s=>s.correct).length;
const defendCorrect=defendScenarios.filter(s=>s.correct).length;
state.roundsPlayed++;

const app=document.getElementById('app');
app.innerHTML=`<div class="screen">
<p style="font-size:14px;color:#64748b;margin-bottom:4px">Round complete!</p>
<div class="stars">${[0,1,2].map(i=>`<div class="star ${i<stars?'earned':'empty'}" style="animation:bounceIn 0.4s ${i*0.15}s both">
<svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 22 12 18.27 5.82 22 7 14.14l-5-4.87 6.91-1.01L12 2z"/></svg></div>`).join('')}</div>
<div class="results-score">${Math.round(state.roundScore)}</div>
<div class="results-breakdown">
<div class="breakdown-row"><span class="breakdown-label">Freeze decisions</span><span class="breakdown-val">${correctCount}/5 correct</span></div>
${attackScenarios.length?`<div class="breakdown-row"><span class="breakdown-label"><span style="color:#fbbf24">⚡</span> Attack decisions</span><span class="breakdown-val">${attackCorrect}/${attackScenarios.length}</span></div>`:''}
${defendScenarios.length?`<div class="breakdown-row"><span class="breakdown-label"><span style="color:#f87171">🛡</span> Defence decisions</span><span class="breakdown-val">${defendCorrect}/${defendScenarios.length}</span></div>`:''}
<div class="breakdown-row"><span class="breakdown-label">Positioning points</span><span class="breakdown-val">${Math.round(state.roundScore-(correctCount*50))}</span></div>
<div class="breakdown-row"><span class="breakdown-label">Decision bonus</span><span class="breakdown-val">${correctCount*50}</span></div>
</div>
<button class="btn btn-primary" onclick="startRound()" style="margin-top:16px">Play again</button>
<button class="btn btn-secondary" onclick="goMenu()">Menu</button>
</div>`}

function goMenu(){state.screen='menu';render()}

window.addEventListener('resize',()=>{if(state.screen==='playing'||state.screen==='freeze'||state.screen==='feedback')sizePitch()});

render();
</script>
